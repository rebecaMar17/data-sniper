<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Sniper | AI Document Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="/static/script.js" defer></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50 min-h-screen flex items-center justify-center p-4 md:p-8 text-slate-800">

    <div class="max-w-5xl w-full bg-white/80 backdrop-blur-xl shadow-2xl rounded-3xl overflow-hidden border border-white">
        
        <div class="grid md:grid-cols-2">
            
            <div class="p-8 md:p-12 bg-white">
                <div class="mb-8">
                    <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-600 text-white mb-4 shadow-lg shadow-indigo-200">
                        <i class="ph ph-target text-2xl"></i>
                    </div>
                    <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 mb-2">Data Sniper</h1>
                    <p class="text-slate-500">Inteligencia Artificial para extraer datos estructurados de PDFs complejos.</p>
                </div>

                <form id="upload-form" class="space-y-6">
                    <div id="drop-zone" class="relative group cursor-pointer">
                        <input id="pdf-file" type="file" accept=".pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" required />
                        <div class="border-2 border-dashed border-slate-300 rounded-2xl p-8 text-center transition-all duration-300 group-hover:border-indigo-500 group-hover:bg-indigo-50 bg-slate-50">
                            <i class="ph ph-file-pdf text-4xl text-slate-400 group-hover:text-indigo-500 mb-3 inline-block transition-colors"></i>
                            <p class="text-sm font-medium text-slate-700 mb-1">Arrastra tu PDF aquí</p>
                            <p class="text-xs text-slate-500 mb-4">o haz clic para explorar</p>
                            <span id="file-name" class="inline-block px-3 py-1 bg-white border border-slate-200 rounded-full text-xs font-semibold text-indigo-600 shadow-sm truncate max-w-full hidden"></span>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white focus:ring-4 focus:ring-indigo-100 font-semibold rounded-xl text-sm px-5 py-3.5 transition-all shadow-lg shadow-indigo-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="ph ph-magic-wand text-lg"></i>
                        Extraer Datos Mágicamente
                    </button>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase">¿Qué quieres extraer? (separado por comas)</label>
                        <input id="custom-fields" type="text" 
                        value="name, phone, date, issuer, total" 
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition-all" />
                    </div>
                </form>
            </div>

            <div class="p-8 md:p-12 bg-slate-50/50 flex flex-col justify-center border-l border-slate-100 relative">
                
                <div id="initial-state" class="text-center text-slate-400">
                    <i class="ph ph-scan text-6xl mb-4 opacity-50"></i>
                    <p class="font-medium">Esperando documento...</p>
                </div>

                <div id="loading" class="hidden flex-col items-center justify-center text-center">
                    <div class="loader mb-4"></div>
                    <p class="font-semibold text-indigo-600">Procesando documento</p>
                    <p class="text-sm text-slate-500 mt-1">Nuestra IA está leyendo el PDF, dame un segundo...</p>
                </div>

                <div id="result-container" class="hidden w-full h-full flex flex-col">
                    <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-4">Datos Extraídos</h3>
                    
                    <div class="space-y-3 mb-8 flex-grow" id="data-cards">
                        </div>

                    <button id="download-btn" class="w-full flex items-center justify-center gap-2 bg-white border-2 border-slate-200 hover:border-indigo-600 hover:text-indigo-600 text-slate-700 font-bold rounded-xl text-sm px-5 py-3.5 transition-all">
                        <i class="ph ph-download-simple text-lg"></i>
                        Descargar Excel (.csv)
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
